<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เติมของเข้า | Koicerys</title>
<style>
:root{
  --navy:#173A8C;
  --blue:#316BFF;
  --bg:#EEF3FB;
  --page:#F8FAFF;
  --card:#FFFFFF;
  --line:#DEE8F5;
  --soft:#F3F6FB;
  --text:#172033;
  --muted:#6D7B93;
  --green:#0F766E;
  --red:#DC2626;
  --shadow:0 14px 34px rgba(23,58,140,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Sarabun","Noto Sans Thai",Arial,sans-serif;
  background:linear-gradient(90deg,#dfe8f6,#f7f9fd,#dfe8f6);
  color:var(--text);
}
.app{
  width:min(100%,1120px);
  margin:0 auto;
  min-height:100vh;
  background:var(--page);
  box-shadow:0 0 55px rgba(15,23,42,.08);
}
.hero{
  background:linear-gradient(145deg,#10245F,#1D4297);
  color:#fff;
  padding:28px 24px 34px;
  border-bottom-left-radius:36px;
  border-bottom-right-radius:36px;
}
.hero-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  margin-bottom:22px;
}
h1{margin:0;font-size:2rem;line-height:1.1;font-weight:950}
.hero p{margin:8px 0 0;color:rgba(255,255,255,.78);font-size:.95rem}
.icon-box{
  width:56px;height:56px;border-radius:20px;
  display:grid;place-items:center;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  font-size:1.55rem;
  flex:0 0 auto;
}
.stats{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.stats.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.stat{
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  border-radius:22px;
  padding:16px;
}
.stat .label{font-size:.78rem;color:rgba(255,255,255,.75);font-weight:800;margin-bottom:6px}
.stat .value{font-size:1.45rem;font-weight:950}
.nav{
  display:grid;
  grid-template-columns:repeat(5,minmax(74px,120px));
  gap:10px;
  padding:16px 24px 6px;
  margin-top:-20px;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav a{
  min-height:74px;
  text-decoration:none;
  color:#26344F;
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:12px 8px;
  text-align:center;
  font-size:.8rem;
  font-weight:900;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
}
.nav a.active{background:var(--blue);color:white;border-color:var(--blue)}
.nav .icon{font-size:1.4rem;line-height:1}
.content{padding:26px 24px 42px}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:12px;
  margin:10px 0 16px;
}
.section-title h2{margin:0;font-size:1.65rem;font-weight:950}
.section-title small{color:var(--muted);font-weight:900;font-size:.95rem;white-space:nowrap}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:26px;
  padding:16px;
  box-shadow:var(--shadow);
}
.search-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:26px;
  padding:14px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}
.search-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:20px;
  padding:10px 12px;
}
.search-icon{font-size:1.3rem;color:var(--muted);flex:0 0 auto}
input,select{
  width:100%;
  min-width:0;
  border:1px solid var(--line);
  background:var(--soft);
  border-radius:18px;
  padding:14px 16px;
  font-size:1rem;
  outline:none;
  color:var(--text);
}
.search-box input{border:0;background:transparent;border-radius:0;padding:10px 2px}
button,.primary,.secondary{
  border:0;border-radius:16px;padding:13px 16px;
  font-weight:950;cursor:pointer;font-size:.95rem;white-space:nowrap;
}
.primary{background:var(--blue);color:white}
.secondary{background:#EEF3FF;color:#245BD4}
.filter-row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
  padding:0 2px 14px;
}
.filter-row::-webkit-scrollbar{display:none}
.filter{
  border:1px solid var(--line);
  background:#fff;
  color:#53627D;
  border-radius:999px;
  padding:11px 16px;
  font-weight:950;
  white-space:nowrap;
  box-shadow:0 8px 22px rgba(27,45,85,.05);
}
.filter.active{background:#EAF1FF;color:#245BD4;border-color:#BCD2FF}
.layout-2{
  display:grid;
  grid-template-columns:minmax(0,1.45fr) minmax(320px,.85fr);
  gap:20px;
  align-items:start;
}
.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
}
.product-card,.stock-card{
  min-height:205px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
  overflow:hidden;
}
.product-card:after,.stock-card:after{
  content:"";
  position:absolute;
  right:-34px;top:-34px;
  width:96px;height:96px;
  border-radius:999px;
  background:#F1F5FF;
}
.add-dot{
  position:absolute;right:12px;top:12px;z-index:2;
  width:34px;height:34px;border-radius:50%;
  background:var(--blue);color:white;
  display:grid;place-items:center;
  font-weight:950;font-size:1.2rem;
}
.emoji{
  width:44px;height:44px;border-radius:17px;
  background:#F6F8FC;
  display:grid;place-items:center;
  font-size:1.4rem;
  margin-bottom:10px;
  position:relative;z-index:1;
}
.name{font-size:1.08rem;font-weight:950;line-height:1.35}
.muted{color:var(--muted);font-size:.9rem;line-height:1.45}
.price{font-size:1.55rem;font-weight:950;color:var(--green)}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.row-start{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.barcode-pill{
  display:inline-block;
  background:#F1F5F9;
  color:#475569;
  border-radius:999px;
  padding:6px 10px;
  font-size:.78rem;
  font-weight:950;
  margin-top:8px;
}
.badge{
  border-radius:999px;
  padding:8px 11px;
  font-size:.8rem;
  font-weight:950;
  white-space:nowrap;
}
.badge.ok{background:#DCFCE7;color:#166534}
.badge.low{background:#FEE2E2;color:#B91C1C}
.badge.out{background:#1F2937;color:white}
.info-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:14px;
  position:relative;
  z-index:1;
}
.info-box{background:var(--soft);border-radius:20px;padding:13px}
.info-box small{display:block;color:var(--muted);font-size:.78rem;font-weight:900;margin-bottom:6px}
.info-box b{font-size:1.25rem;font-weight:950}
.cart-card{
  position:sticky;
  top:20px;
}
.total{background:var(--soft);border-radius:20px;padding:13px}
.total small{display:block;color:var(--muted);font-size:.78rem;font-weight:800}
.total b{font-size:1.35rem;font-weight:950}
.checkout-row{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.table-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid #EEF2F7;
}
.table-row:last-child{border-bottom:0}
.form{display:grid;gap:12px}
.form label{font-size:.9rem;font-weight:950;color:#53627D}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.list{display:grid;gap:14px}
.report-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.empty{
  text-align:center;
  padding:30px 18px;
  color:var(--muted);
  background:white;
  border-radius:28px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.empty h3{margin:0 0 8px;font-size:1.25rem;color:var(--text)}
.empty p{margin:0 0 16px;font-size:.95rem;line-height:1.5}
.help{font-size:.82rem;color:var(--muted);margin-top:8px;line-height:1.5}
@media(max-width:900px){
  .app{width:min(100%,720px)}
  .layout-2{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .report-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .cart-card{position:static}
  .hero{padding:28px 20px 34px}
  .content{padding:22px 20px 34px}
  .nav{padding:16px 20px 6px}
}
@media(max-width:520px){
  .app{width:100%}
  h1{font-size:1.75rem}
  .hero{padding:24px 16px 32px}
  .content{padding:20px 16px 32px}
  .nav{padding:16px 16px 6px;grid-template-columns:repeat(5,minmax(78px,1fr))}
  .stats,.stats.three{grid-template-columns:1fr}
  .grid,.report-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
  .search-box{align-items:stretch}
  .search-btn{padding-left:14px;padding-right:14px}
}
</style>
</head>
<body>

<div class="app">
<header class="hero"><div class="hero-top"><div><h1>เติมของเข้า</h1><p>ยิงบาร์โค้ดเพื่อเลือกสินค้าเข้า</p></div><div class="icon-box">➕</div></div><div class="stats"><div class="stat"><div class="label">วันนี้รับเข้า</div><div class="value">0</div></div><div class="stat"><div class="label">สถานะ</div><div class="value">Demo</div></div></div></header>
<nav class="nav"><a class="" href="index.html"><span class="icon">🧾</span>ขาย</a><a class="" href="stock.html"><span class="icon">📦</span>สต๊อก</a><a class="active" href="add-stock.html"><span class="icon">➕</span>เติมของ</a><a class="" href="product.html"><span class="icon">🏷️</span>สินค้า</a><a class="" href="report.html"><span class="icon">📊</span>รายงาน</a></nav>
<main class="content">
  <div class="section-title"><h2>รับสินค้าเข้า</h2><small>Barcode input</small></div>
  <div class="layout-2">
    <section class="card form">
      <label>ยิงบาร์โค้ด</label><input id="barcode" placeholder="ยิงบาร์โค้ดแล้วกด Enter" onkeydown="handleRestockScan(event)" autofocus>
      <label>สินค้า</label><select id="productSelect"></select>
      <label>จำนวนเข้า</label><input id="qty" type="number" placeholder="เช่น 24">
      <div class="form-grid"><div><label>ต้นทุนใหม่/ชิ้น</label><input id="cost" type="number" placeholder="เว้นว่าง = ใช้ทุนเดิม"></div><div><label>ราคาขายใหม่/ชิ้น</label><input id="price" type="number" placeholder="เว้นว่าง = ใช้ราคาเดิม"></div></div>
      <label>Supplier</label><input id="supplier" placeholder="เช่น แม็คโคร / ร้านส่ง">
      <button class="primary" onclick="saveRestock()">บันทึกเติมของเข้า</button>
    </section>
    <aside class="card"><div class="name">ประวัติรับเข้า</div><div id="history" class="muted" style="margin-top:10px">ยังไม่มีรายการ</div></aside>
  </div>
</main>
</div>

<script>
let products = [
  { id:1, barcode:"8850001000011", name:"น้ำดื่มคริสตัล 600ml", category:"เครื่องดื่ม", cost:5, price:7, stock:24, reorder:10, emoji:"💧" },
  { id:2, barcode:"8850001000028", name:"โค้กกระป๋อง", category:"เครื่องดื่ม", cost:14, price:18, stock:18, reorder:8, emoji:"🥤" },
  { id:3, barcode:"8850001000035", name:"โออิชิ 500ml", category:"เครื่องดื่ม", cost:16, price:22, stock:9, reorder:10, emoji:"🍵" },
  { id:4, barcode:"8850001000042", name:"มาม่าต้มยำกุ้ง", category:"ของแห้ง", cost:6, price:8, stock:50, reorder:20, emoji:"🍜" },
  { id:5, barcode:"8850001000059", name:"เลย์โนริ", category:"ขนม", cost:15, price:20, stock:12, reorder:10, emoji:"🍟" },
  { id:6, barcode:"8850001000066", name:"นมถั่วเหลือง", category:"นม/แช่เย็น", cost:10, price:13, stock:6, reorder:8, emoji:"🥛" },
  { id:7, barcode:"8850001000073", name:"สบู่ก้อน", category:"ของใช้", cost:18, price:25, stock:14, reorder:6, emoji:"🧼" },
  { id:8, barcode:"8850001000080", name:"ทิชชู่ห่อเล็ก", category:"ของใช้", cost:9, price:12, stock:20, reorder:8, emoji:"🧻" }
];
function money(n){return Number(n).toLocaleString();}
function statusOf(p){
  if(p.stock<=0) return {text:"หมด",cls:"out"};
  if(p.stock<=p.reorder) return {text:"ใกล้หมด",cls:"low"};
  return {text:"ปกติ",cls:"ok"};
}
function matchProduct(p,q){
  q = String(q || "").trim().toLowerCase();
  return !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || String(p.barcode).includes(q);
}
</script>
<script>
function init(){productSelect.innerHTML=products.map(p=>`<option value="${p.id}">${p.name} · ${p.barcode} · เหลือ ${p.stock} · ทุน ฿${p.cost} · ขาย ฿${p.price}</option>`).join("");}
function handleRestockScan(e){
 if(e.key==="Enter"){const p=products.find(x=>x.barcode===barcode.value.trim());if(p)productSelect.value=p.id;else alert("ไม่พบบาร์โค้ดนี้ในระบบ");}
}
function saveRestock(){
 const p=products.find(x=>x.id==productSelect.value);
 const q=Number(qty.value||0), c=Number(cost.value||0), newPrice=Number(price.value||0);
 if(!q)return alert("กรอกจำนวนก่อน");
 p.stock+=q; if(c>0)p.cost=c; if(newPrice>0)p.price=newPrice;
 history.innerHTML=`รับเข้า ${p.name} (${p.barcode}) จำนวน ${q} ชิ้น<br>ต้นทุน ฿${p.cost} · ราคาขาย ฿${p.price}<br>Supplier: ${supplier.value||"-"} (Demo)`;
 init(); qty.value=cost.value=price.value=supplier.value=barcode.value="";
}
init();
</script>
</body>
</html>
