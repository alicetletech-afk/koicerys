<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ขายสินค้า | Koicerys</title>
<style>
:root{
  --navy:#173A8C;
  --blue:#316BFF;
  --page:#F8FAFF;
  --card:#FFFFFF;
  --line:#DEE8F5;
  --soft:#F3F6FB;
  --text:#172033;
  --muted:#6D7B93;
  --green:#0F766E;
  --shadow:0 14px 34px rgba(23,58,140,.08);
}
*{box-sizing:border-box}
html,body{min-height:100%;overflow-x:hidden}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Sarabun","Noto Sans Thai",Arial,sans-serif;
  background:#F1F5FB;
  color:var(--text);
}
.app{
  width:100%;
  min-height:100vh;
  background:var(--page);
}
.hero{
  width:100%;
  background:linear-gradient(145deg,#10245F,#1D4297);
  color:#fff;
  padding:32px clamp(18px,4vw,56px) 60px;
  border-bottom-left-radius:36px;
  border-bottom-right-radius:36px;
}
.hero-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  margin-bottom:22px;
}
h1{
  margin:0;
  font-size:clamp(1.75rem,2.4vw,2.35rem);
  line-height:1.1;
  font-weight:950;
}
.hero p{
  margin:8px 0 0;
  color:rgba(255,255,255,.78);
  font-size:.95rem;
}
.icon-box{
  width:58px;
  height:58px;
  border-radius:20px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  font-size:1.55rem;
  flex:0 0 auto;
}
.stats{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.stat{
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  border-radius:22px;
  padding:16px 18px;
  min-width:0;
}
.stat .label{
  font-size:.78rem;
  color:rgba(255,255,255,.75);
  font-weight:800;
  margin-bottom:6px;
}
.stat .value{
  font-size:1.45rem;
  font-weight:950;
}
.nav{
  display:flex;
  gap:12px;
  padding:24px clamp(18px,4vw,56px) 0;
  margin-top:0;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav a{
  width:128px;
  min-width:112px;
  min-height:74px;
  text-decoration:none;
  color:#26344F;
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:12px 8px;
  text-align:center;
  font-size:.8rem;
  font-weight:900;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
}
.nav a.active{
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}
.nav .icon{
  font-size:1.4rem;
  line-height:1;
}
.content{
  padding:32px clamp(18px,4vw,56px) 48px;
}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:12px;
  margin:0 0 16px;
}
.section-title h2{
  margin:0;
  font-size:1.6rem;
  font-weight:950;
}
.section-title small{
  color:var(--muted);
  font-weight:900;
  font-size:.95rem;
  white-space:nowrap;
}
.layout-pos{
  display:grid;
  grid-template-columns:minmax(0,1fr) 420px;
  gap:24px;
  align-items:start;
}
.pos-main,
.cart-area{
  min-width:0;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:26px;
  padding:18px;
  box-shadow:var(--shadow);
  min-width:0;
}
.search-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:26px;
  padding:14px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}
.search-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:16px;
  padding:0 12px;
  min-width:0;
}
.search-box input{
  width:100%;
  min-width:0;
  border:0;
  background:transparent;
  padding:13px 4px;
  font-size:1rem;
  outline:0;
  color:var(--text);
}
.search-box span{
  color:var(--muted);
}
button,.primary{
  border:0;
  border-radius:16px;
  padding:13px 16px;
  font-weight:950;
  cursor:pointer;
  font-size:.95rem;
  white-space:nowrap;
}
.primary{
  background:var(--blue);
  color:white;
}
.help{
  font-size:.82rem;
  color:var(--muted);
  margin-top:8px;
  line-height:1.5;
}
.filter-row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
  padding:0 2px 14px;
}
.filter-row::-webkit-scrollbar{display:none}
.filter{
  border:1px solid var(--line);
  background:#fff;
  color:#53627D;
  border-radius:999px;
  padding:11px 16px;
  font-weight:950;
  white-space:nowrap;
  box-shadow:0 8px 22px rgba(27,45,85,.05);
}
.filter.active{
  background:#EAF1FF;
  color:#245BD4;
  border-color:#BCD2FF;
}
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}
.product-card{
  min-height:205px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}
.product-card:after{
  content:"";
  position:absolute;
  right:-34px;
  top:-34px;
  width:96px;
  height:96px;
  border-radius:999px;
  background:#F1F5FF;
}
.add-dot{
  position:absolute;
  right:12px;
  top:12px;
  z-index:2;
  width:34px;
  height:34px;
  border-radius:50%;
  background:var(--blue);
  color:white;
  display:grid;
  place-items:center;
  font-weight:950;
  font-size:1.2rem;
}
.emoji{
  width:44px;
  height:44px;
  border-radius:17px;
  background:#F6F8FC;
  display:grid;
  place-items:center;
  font-size:1.4rem;
  margin-bottom:10px;
  position:relative;
  z-index:1;
}
.name{
  font-size:1.08rem;
  font-weight:950;
  line-height:1.35;
}
.muted{
  color:var(--muted);
  font-size:.9rem;
  line-height:1.45;
}
.price{
  font-size:1.55rem;
  font-weight:950;
  color:var(--green);
}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.barcode{
  display:inline-block;
  background:#F1F5F9;
  color:#475569;
  border-radius:999px;
  padding:5px 9px;
  font-size:.75rem;
  font-weight:950;
  margin-top:5px;
  max-width:100%;
  word-break:break-all;
}
.cart-card{
  position:sticky;
  top:20px;
}
.cart-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
  font-weight:950;
}
.cart-list{
  max-height:260px;
  overflow:auto;
  margin-bottom:12px;
}
.table-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid #EEF2F7;
}
.table-row:last-child{
  border-bottom:0;
}
.total{
  background:var(--soft);
  border-radius:20px;
  padding:13px;
  margin-bottom:12px;
}
.total small{
  display:block;
  color:var(--muted);
  font-size:.78rem;
  font-weight:800;
}
.total b{
  font-size:1.35rem;
  font-weight:950;
}
.pay-section{
  display:grid;
  gap:10px;
}
.pay-section label{
  color:var(--muted);
  font-weight:900;
  font-size:.85rem;
}
.pay-section select,
.pay-section input{
  width:100%;
  border:1px solid var(--line);
  background:var(--soft);
  border-radius:16px;
  padding:13px 15px;
  font-size:1rem;
  outline:0;
}
.payment-extra{
  display:none;
}
.payment-extra.active{
  display:grid;
  gap:10px;
}
.empty{
  text-align:center;
  padding:30px 18px;
  color:var(--muted);
  background:#fff;
  border-radius:28px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
@media(max-width:1180px){
  .layout-pos{
    grid-template-columns:1fr;
  }
  .cart-area{
    order:-1;
  }
  .cart-card{
    position:static;
  }
  .cart-list{
    max-height:180px;
  }
}
@media(max-width:720px){
  .hero{
    padding:24px 16px 32px;
  }
  .content{
    padding:24px 16px 40px;
  }
  .nav{
    padding:24px 16px 0;
  }
  h1{
    font-size:1.75rem;
  }
  .stats{
    grid-template-columns:1fr;
  }
  .product-grid{
    grid-template-columns:1fr 1fr;
  }
  .search-box{
    align-items:stretch;
  }
  .search-box .primary{
    padding-left:14px;
    padding-right:14px;
  }
}
@media(max-width:430px){
  .product-grid{
    grid-template-columns:1fr;
  }
  .section-title{
    display:block;
  }
  .section-title small{
    display:block;
    margin-top:6px;
  }
}
</style>
</head>
<body>
<div class="app">
<header class="hero">
  <div class="hero-top">
    <div>
      <h1>ร้านของชำ</h1>
      <p>ขายสินค้า / ยิงบาร์โค้ด / ค้นหาด้วยชื่อ</p>
    </div>
    <div class="icon-box">🛒</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="label">ยอดขายวันนี้</div>
      <div class="value">฿<span id="todaySales">0</span></div>
    </div>
    <div class="stat">
      <div class="label">สินค้าใกล้หมด</div>
      <div class="value"><span id="lowStock">0</span> รายการ</div>
    </div>
  </div>
</header>

<nav class="nav">
  <a class="active" href="index.html"><span class="icon">🧾</span>ขาย</a>
  <a href="stock.html"><span class="icon">📦</span>สต๊อก</a>
  <a href="add-stock.html"><span class="icon">➕</span>เติมของ</a>
  <a href="product.html"><span class="icon">🏷️</span>สินค้า</a>
  <a href="report.html"><span class="icon">📊</span>รายงาน</a>
</nav>

<main class="content">
  <div class="section-title">
    <h2>ขายสินค้า</h2>
    <small>Barcode-ready</small>
  </div>

  <div class="layout-pos">
    <section class="pos-main">
      <div class="search-card">
        <div class="search-box">
          <span>📷</span>
          <input id="searchInput" placeholder="ยิงบาร์โค้ด หรือค้นหาชื่อสินค้า" onkeydown="handleScan(event)">
          <button class="primary" onclick="renderProducts()">ค้นหา</button>
        </div>
        <div class="help">คลิกช่องนี้ไว้ ถ้าใช้เครื่องยิงบาร์โค้ด เครื่องจะกด Enter ให้อัตโนมัติ</div>
      </div>

      <div class="filter-row" id="categoryList"></div>
      <div class="product-grid" id="productList"></div>
    </section>

    <aside class="cart-area">
      <div class="card cart-card">
        <div class="cart-head">
          <span>ตะกร้าสินค้า</span>
          <span><span id="cartCount">0</span> ชิ้น</span>
        </div>

        <div id="cartList" class="cart-list"></div>

        <div class="total">
          <small>ยอดรวม</small>
          <b>฿<span id="cartTotal">0</span></b>
        </div>

        <div class="pay-section">
          <label>ช่องทางชำระ</label>
          <select id="paymentMethod" onchange="renderPaymentFields()">
            <option value="cash">เงินสด</option>
            <option value="transfer">เงินโอน</option>
            <option value="credit">บัตรเครดิต</option>
          </select>

          <div id="cashFields" class="payment-extra active">
            <label>รับเงินมา</label>
            <input id="cashReceived" type="number" placeholder="เช่น 100" oninput="calculateChange()">
            <div class="total">
              <small>เงินทอน</small>
              <b>฿<span id="changeAmount">0</span></b>
            </div>
          </div>

          <div id="transferFields" class="payment-extra">
            <label>เลขอ้างอิง / หมายเหตุการโอน</label>
            <input id="transferRef" placeholder="เช่น PromptPay / Ref No.">
          </div>

          <div id="creditFields" class="payment-extra">
            <label>เลขท้ายบัตร 4 ตัว</label>
            <input id="creditLast4" maxlength="4" placeholder="เช่น 1234">
          </div>

          <button class="primary" onclick="checkout()">ยืนยันชำระเงิน / ตัดสต๊อก</button>
        </div>
      </div>
    </aside>
  </div>
</main>
</div>

<script>
let products=[
  {id:1,barcode:"8850001000011",name:"น้ำดื่มคริสตัล 600ml",category:"เครื่องดื่ม",cost:5,price:7,stock:24,reorder:10,emoji:"💧"},
  {id:2,barcode:"8850001000028",name:"โค้กกระป๋อง",category:"เครื่องดื่ม",cost:14,price:18,stock:18,reorder:8,emoji:"🥤"},
  {id:3,barcode:"8850001000035",name:"โออิชิ 500ml",category:"เครื่องดื่ม",cost:16,price:22,stock:9,reorder:10,emoji:"🍵"},
  {id:4,barcode:"8850001000042",name:"มาม่าต้มยำกุ้ง",category:"ของแห้ง",cost:6,price:8,stock:50,reorder:20,emoji:"🍜"},
  {id:5,barcode:"8850001000059",name:"เลย์โนริ",category:"ขนม",cost:15,price:20,stock:12,reorder:10,emoji:"🍟"},
  {id:6,barcode:"8850001000066",name:"นมถั่วเหลือง",category:"นม/แช่เย็น",cost:10,price:13,stock:6,reorder:8,emoji:"🥛"},
  {id:7,barcode:"8850001000073",name:"สบู่ก้อน",category:"ของใช้",cost:18,price:25,stock:14,reorder:6,emoji:"🧼"},
  {id:8,barcode:"8850001000080",name:"ทิชชู่ห่อเล็ก",category:"ของใช้",cost:9,price:12,stock:20,reorder:8,emoji:"🧻"}
];

let cart=[];
let totalSales=0;
let currentCategory="ทั้งหมด";

function money(n){
  return Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});
}

function matchProduct(p,q){
  q=String(q||"").trim().toLowerCase();
  return !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || String(p.barcode).includes(q);
}

function cartTotal(){
  return cart.reduce((s,i)=>s+i.price*i.qty,0);
}

function renderCategories(){
  const cats=["ทั้งหมด",...new Set(products.map(p=>p.category))];
  categoryList.innerHTML=cats.map(c=>`
    <button class="filter ${c===currentCategory?'active':''}" onclick="currentCategory='${c}';renderCategories();renderProducts()">${c}</button>
  `).join("");
}

function renderProducts(){
  const q=searchInput.value;
  const filtered=products.filter(p=>(currentCategory==="ทั้งหมด"||p.category===currentCategory)&&matchProduct(p,q));

  productList.innerHTML=filtered.map(p=>`
    <div class="card product-card" onclick="addToCart(${p.id})">
      <div class="add-dot">+</div>
      <div>
        <div class="emoji">${p.emoji}</div>
        <div class="name">${p.name}</div>
        <span class="barcode">Barcode: ${p.barcode}</span>
      </div>
      <div class="row">
        <div class="price">฿${p.price}</div>
        <div class="muted" style="text-align:right">เหลือ<br>${p.stock} ชิ้น</div>
      </div>
    </div>
  `).join("") || `<div class="empty" style="grid-column:1/-1">ไม่พบสินค้า</div>`;
}

function addToCart(id){
  const p=products.find(x=>x.id===id);
  if(!p || p.stock<=0){
    alert("สินค้าหมด");
    return;
  }

  const item=cart.find(x=>x.id===id);
  if(item){
    if(item.qty>=p.stock){
      alert("จำนวนเกินสต๊อก");
      return;
    }
    item.qty++;
  }else{
    cart.push({...p,qty:1});
  }

  renderCart();
}

function renderCart(){
  const count=cart.reduce((s,i)=>s+i.qty,0);
  const total=cartTotal();

  cartCount.innerText=count;
  cartTotal.innerText=money(total);

  cartList.innerHTML=cart.length?cart.map(i=>`
    <div class="table-row">
      <span>${i.name} x ${i.qty}</span>
      <b>฿${money(i.price*i.qty)}</b>
    </div>
  `).join(""):`<div class="muted" style="padding:10px 0">ยังไม่มีสินค้า</div>`;

  calculateChange();
}

function handleScan(e){
  if(e.key==="Enter"){
    const p=products.find(x=>x.barcode===searchInput.value.trim());
    if(p){
      addToCart(p.id);
      searchInput.value="";
      renderProducts();
    }else{
      renderProducts();
    }
  }
}

function renderPaymentFields(){
  const method=paymentMethod.value;

  cashFields.classList.toggle("active",method==="cash");
  transferFields.classList.toggle("active",method==="transfer");
  creditFields.classList.toggle("active",method==="credit");

  calculateChange();
}

function calculateChange(){
  const received=Number(cashReceived.value||0);
  const change=Math.max(received-cartTotal(),0);
  changeAmount.innerText=money(change);
}

function checkout(){
  if(!cart.length){
    alert("ยังไม่มีสินค้า");
    return;
  }

  const total=cartTotal();
  const method=paymentMethod.value;
  const paymentText={cash:"เงินสด",transfer:"เงินโอน",credit:"บัตรเครดิต"}[method];

  if(method==="cash"){
    const received=Number(cashReceived.value||0);
    if(received<total){
      alert("รับเงินมายังไม่พอยอดรวม");
      return;
    }
  }

  if(method==="transfer" && !transferRef.value.trim()){
    alert("กรอกเลขอ้างอิง/หมายเหตุการโอนก่อน");
    return;
  }

  if(method==="credit" && creditLast4.value.trim().length<4){
    alert("กรอกเลขท้ายบัตร 4 ตัวก่อน");
    return;
  }

  cart.forEach(i=>{
    const p=products.find(x=>x.id===i.id);
    if(p) p.stock-=i.qty;
  });

  totalSales+=total;

  alert("ขายสำเร็จ\\nยอด: ฿"+money(total)+"\\nชำระโดย: "+paymentText+"\\nตัดสต๊อกแล้ว (Demo)");

  cart=[];
  todaySales.innerText=money(totalSales);
  lowStock.innerText=products.filter(p=>p.stock<=p.reorder).length;
  cashReceived.value="";
  transferRef.value="";
  creditLast4.value="";
  renderCart();
  renderProducts();
}

renderCategories();
renderProducts();
renderCart();
lowStock.innerText=products.filter(p=>p.stock<=p.reorder).length;
</script>
</body>
</html>
