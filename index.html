<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koicerys POS</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f5fb;
}
.header{
  background:#173b92;
  color:white;
  padding:32px;
  border-radius:0 0 36px 36px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-top:20px;
}
.stat{
  background:rgba(255,255,255,.15);
  padding:20px;
  border-radius:18px;
}
.nav{
  display:flex;
  justify-content:center;
  gap:16px;
  padding:24px 16px;
  overflow-x:auto;
}
.nav-btn{
  min-width:130px;
  height:90px;
  border-radius:20px;
  border:1px solid #dce2f0;
  background:#fff;
  font-weight:bold;
  flex-shrink:0;
}
.nav-btn.active{
  background:#3468f5;
  color:white;
}
.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:24px;
}
.box{
  background:white;
  border-radius:20px;
  padding:20px;
}
.search{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ddd;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin-top:20px;
}
.product{
  background:white;
  border-radius:20px;
  padding:16px;
}
.pay-select,.cash-input{
  width:100%;
  padding:14px;
  border-radius:14px;
  margin-top:12px;
}
.pay-btn{
  width:100%;
  padding:16px;
  margin-top:16px;
  border:none;
  border-radius:14px;
  background:#3468f5;
  color:white;
  font-weight:bold;
}
@media(max-width:900px){
  .main{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>ร้านของชำ</h1>
  <p>ขายสินค้า / ยิงบาร์โค้ด / ค้นหาด้วยชื่อ</p>

  <div class="stats">
    <div class="stat">ยอดขายวันนี้<br><h2>฿0</h2></div>
    <div class="stat">สินค้าใกล้หมด<br><h2>2 รายการ</h2></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active">🧾 ขาย</button>
  <button class="nav-btn">📦 สต๊อก</button>
  <button class="nav-btn">➕ เติมของ</button>
  <button class="nav-btn">🏷️ สินค้า</button>
  <button class="nav-btn">📊 รายงาน</button>
</div>

<div class="main">
  <div>
    <div class="box">
      <input class="search" placeholder="ยิงบาร์โค้ด หรือค้นหาชื่อสินค้า">
    </div>

    <div class="products">
      <div class="product">น้ำดื่มคริสตัล<br>฿7</div>
      <div class="product">โค้กกระป๋อง<br>฿18</div>
      <div class="product">โออิชิ 500ml<br>฿22</div>
      <div class="product">มาม่าต้มยำกุ้ง<br>฿8</div>
    </div>
  </div>

  <div class="box">
    <h3>ตะกร้าสินค้า</h3>
    <p>น้ำดื่มคริสตัล x2</p>
    <h2>รวม ฿14</h2>

    <label>ช่องทางชำระเงิน</label>
    <select class="pay-select">
      <option>เงินสด</option>
      <option>เงินโอน</option>
      <option>บัตรเครดิต</option>
    </select>

    <input class="cash-input" placeholder="จำนวนเงินที่รับมา">

    <button class="pay-btn">ชำระเงิน / ตัดสต๊อก</button>
  </div>
</div>

</body>
</html>
