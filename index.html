<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koicerys POS</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f5fb;color:#111827;}
.header{background:#173b92;color:white;padding:32px;border-radius:0 0 36px 36px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px;}
.stat{background:rgba(255,255,255,.15);padding:20px;border-radius:18px;}
.nav{display:flex;justify-content:center;gap:16px;padding:24px;overflow-x:auto;}
.nav a{
  min-width:130px;
  height:90px;
  border-radius:18px;
  border:1px solid #dce2f0;
  background:white;
  font-weight:bold;
  color:#111827;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-shrink:0;
}
.nav a.active{background:#3468f5;color:white;}
.main{display:grid;grid-template-columns:2fr 1fr;gap:20px;padding:24px;}
.box{background:white;padding:20px;border-radius:20px;}
.search-wrap{display:flex;gap:10px;}
.search{flex:1;padding:14px;border-radius:14px;border:1px solid #ddd;}
.search-btn{padding:14px 20px;border:none;border-radius:14px;background:#3468f5;color:white;font-weight:bold;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:20px;}
.product{background:white;padding:16px;border-radius:16px;}
input,select{width:100%;padding:14px;margin-top:12px;border-radius:12px;border:1px solid #ddd;box-sizing:border-box;}
.pay-btn{width:100%;padding:16px;margin-top:16px;border:none;border-radius:14px;background:#3468f5;color:white;font-weight:bold;}
.hidden{display:none;}
@media(max-width:900px){.main{grid-template-columns:1fr;}.nav{justify-content:flex-start;}}
</style>
<script>
function togglePayment(){
  let method=document.getElementById("payment").value;
  document.getElementById("cash-box").style.display = method==="เงินสด" ? "block":"none";
  document.getElementById("transfer-box").style.display = method==="เงินโอน" ? "block":"none";
}
function calcChange(){
  let total=14;
  let received=parseFloat(document.getElementById("cash").value)||0;
  let change=received-total;
  document.getElementById("change").value=change>=0?change:0;
}
</script>
</head>
<body>

<div class="header">
<h1>ร้านของชำ</h1>
<p>ขายสินค้า / ยิงบาร์โค้ด / ค้นหาด้วยชื่อ</p>
<div class="stats">
<div class="stat">ยอดขายวันนี้<br><h2>฿0</h2></div>
<div class="stat">สินค้าใกล้หมด<br><h2>2 รายการ</h2></div>
</div>
</div>

<div class="nav">
<a class="active" href="index.html">🧾<br>ขาย</a>
<a href="stock.html">📦<br>สต๊อก</a>
<a href="add-stock.html">➕<br>เติมของ</a>
<a href="product.html">🏷️<br>สินค้า</a>
<a href="report.html">📊<br>รายงาน</a>
</div>

<div class="main">
<div>
<div class="box">
<div class="search-wrap">
<input class="search" placeholder="ยิงบาร์โค้ด หรือค้นหาชื่อสินค้า">
<button class="search-btn">ค้นหา</button>
</div>
</div>

<div class="products">
<div class="product">น้ำดื่มคริสตัล<br>฿7</div>
<div class="product">โค้กกระป๋อง<br>฿18</div>
<div class="product">โออิชิ 500ml<br>฿22</div>
<div class="product">มาม่าต้มยำกุ้ง<br>฿8</div>
</div>
</div>

<div class="box">
<h3>ตะกร้าสินค้า</h3>
<p>น้ำดื่มคริสตัล x2</p>
<h2>รวม ฿14</h2>

<label>ช่องทางชำระเงิน</label>
<select id="payment" onchange="togglePayment()">
<option>เงินสด</option>
<option>เงินโอน</option>
</select>

<div id="cash-box">
<input id="cash" placeholder="รับเงินจากลูกค้า" oninput="calcChange()">
<input id="change" placeholder="เงินทอน" readonly>
</div>

<div id="transfer-box" class="hidden">
<input placeholder="เลขอ้างอิงการโอน">
</div>

<button class="pay-btn">ชำระเงิน / ตัดสต๊อก</button>
</div>
</div>

</body>
</html>
