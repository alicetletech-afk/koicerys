<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Barcode | ร้านของชำ</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Sarabun","Noto Sans Thai",Arial,sans-serif;background:#f3f6fb;color:#182235}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#f7f9fd;padding-bottom:28px}
.hero{background:linear-gradient(145deg,#10245f,#1c3f8f);color:white;padding:24px 20px 28px;border-bottom-left-radius:34px;border-bottom-right-radius:34px;box-shadow:0 18px 35px rgba(16,36,95,.25)}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px}
h1{margin:0;font-size:28px;line-height:1.15}.hero p{margin:6px 0 0;opacity:.78;font-size:14px}
.icon-box{width:48px;height:48px;border-radius:17px;background:rgba(255,255,255,.15);display:grid;place-items:center;font-size:24px;border:1px solid rgba(255,255,255,.16)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:13px 10px}
.stat .label{font-size:11px;opacity:.75;margin-bottom:5px}.stat .value{font-size:20px;font-weight:900}
.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px 14px 2px;margin-top:-8px}
.nav a{text-decoration:none;color:#31415f;background:white;border:1px solid #e7edf6;border-radius:18px;padding:11px 4px;text-align:center;font-size:11px;font-weight:800;box-shadow:0 8px 20px rgba(27,45,85,.06)}
.nav a.active{color:white;background:#2f68e8;border-color:#2f68e8}.nav .icon{display:block;font-size:19px;margin-bottom:4px}
.content{padding:16px}.section-title{display:flex;justify-content:space-between;align-items:end;margin:8px 2px 14px}
.section-title h2{margin:0;font-size:22px}.section-title small{color:#72809a;font-weight:800}
.search-card{background:white;border-radius:24px;padding:14px;box-shadow:0 12px 28px rgba(27,45,85,.07);border:1px solid #e8eef6;margin-bottom:14px}
.search-box{display:flex;align-items:center;gap:10px;background:#f4f7fb;border:1px solid #e0e7f2;border-radius:18px;padding:10px 12px}
.search-box span{font-size:18px;color:#74819a}.search-box input{border:0;outline:0;background:transparent;width:100%;font-size:15px;color:#182235}
.search-btn{border:0;background:#2f68e8;color:white;border-radius:14px;padding:11px 14px;font-weight:900;cursor:pointer}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 14px;scrollbar-width:none}.filter-row::-webkit-scrollbar{display:none}
.filter{border:1px solid #e7edf6;background:white;color:#53627d;border-radius:999px;padding:10px 14px;font-weight:900;white-space:nowrap;box-shadow:0 8px 20px rgba(27,45,85,.05);cursor:pointer}
.filter.active{background:#eaf1ff;color:#245bd4;border-color:#bcd2ff}
.card{background:white;border:1px solid #e7edf6;border-radius:24px;padding:14px;box-shadow:0 10px 24px rgba(27,45,85,.055);margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.name{font-size:16px;font-weight:950;line-height:1.35}.muted{color:#72809a;font-size:13px}
.barcode-pill{display:inline-block;background:#f1f5f9;color:#475569;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;margin-top:8px}
.badge{border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950;white-space:nowrap}.badge.ok{background:#dcfce7;color:#166534}.badge.low{background:#fee2e2;color:#b91c1c}.badge.out{background:#1f2937;color:white}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.info-box{background:#f3f6fb;border-radius:18px;padding:12px}
.info-box small{display:block;color:#72809a;font-size:11px;font-weight:900;margin-bottom:6px}
.info-box b{font-size:22px;font-weight:950;color:#182235}
.empty{text-align:center;padding:30px 18px;color:#72809a;background:white;border-radius:28px;border:1px solid #e7edf6;box-shadow:0 10px 24px rgba(27,45,85,.055)}
.primary{border:0;background:#2f68e8;color:white;border-radius:14px;padding:11px 14px;font-weight:900;cursor:pointer}
@media(min-width:768px){body{background:#dfe7f4}.app{box-shadow:0 0 60px rgba(15,23,42,.12)}}
</style>
</head>
<body>
<div class="app">
<header class="hero">
  <div class="hero-top">
    <div><h1>สต๊อกสินค้า</h1><p>ค้นด้วยชื่อ / หมวด / บาร์โค้ด</p></div>
    <div class="icon-box">📦</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="label">สินค้าทั้งหมด</div><div class="value"><span id="totalSku">0</span></div></div>
    <div class="stat"><div class="label">ใกล้หมด</div><div class="value"><span id="lowCount">0</span></div></div>
    <div class="stat"><div class="label">มูลค่าสต๊อก</div><div class="value">฿<span id="stockValue">0</span></div></div>
  </div>
</header>

<nav class="nav">
  <a href="index.html"><span class="icon">🧾</span>ขาย</a>
  <a class="active" href="stock.html"><span class="icon">📦</span>สต๊อก</a>
  <a href="add-stock.html"><span class="icon">➕</span>เติมของ</a>
  <a href="product.html"><span class="icon">🏷️</span>สินค้า</a>
  <a href="report.html"><span class="icon">📊</span>รายงาน</a>
</nav>

<main class="content">
  <div class="section-title"><h2>รายการสินค้า</h2><small>มี Barcode</small></div>
  <div class="search-card">
    <div class="search-box">
      <span>🔎</span>
      <input id="searchInput" placeholder="ยิงบาร์โค้ด หรือค้นหาชื่อสินค้า" onkeydown="if(event.key==='Enter')renderStock()">
      <button class="search-btn" onclick="renderStock()">ค้นหา</button>
    </div>
  </div>

  <div class="filter-row" id="filterRow"></div>
  <div class="filter-row">
    <button class="filter" onclick="sortStock('az')">A-Z</button>
    <button class="filter" onclick="sortStock('low')">คงเหลือน้อย</button>
    <button class="filter" onclick="sortStock('highValue')">มูลค่าสูง</button>
  </div>

  <div id="stockList"></div>
</main>
</div>

<script>
const products = [
  { id:1, barcode:"8850001000011", name:"น้ำดื่มคริสตัล 600ml", category:"เครื่องดื่ม", cost:5, price:7, stock:24, reorder:10 },
  { id:2, barcode:"8850001000028", name:"โค้กกระป๋อง", category:"เครื่องดื่ม", cost:14, price:18, stock:18, reorder:8 },
  { id:3, barcode:"8850001000035", name:"โออิชิ 500ml", category:"เครื่องดื่ม", cost:16, price:22, stock:9, reorder:10 },
  { id:4, barcode:"8850001000042", name:"มาม่าต้มยำกุ้ง", category:"ของแห้ง", cost:6, price:8, stock:50, reorder:20 },
  { id:5, barcode:"8850001000059", name:"เลย์โนริ", category:"ขนม", cost:15, price:20, stock:12, reorder:10 },
  { id:6, barcode:"8850001000066", name:"นมถั่วเหลือง", category:"นม/แช่เย็น", cost:10, price:13, stock:6, reorder:8 },
  { id:7, barcode:"8850001000073", name:"สบู่ก้อน", category:"ของใช้", cost:18, price:25, stock:14, reorder:6 },
  { id:8, barcode:"8850001000080", name:"ทิชชู่ห่อเล็ก", category:"ของใช้", cost:9, price:12, stock:20, reorder:8 }
];

let currentFilter = "ทั้งหมด";

function money(n){return Number(n).toLocaleString();}
function statusOf(p){
  if(p.stock<=0) return {text:"หมด",cls:"out"};
  if(p.stock<=p.reorder) return {text:"ใกล้หมด",cls:"low"};
  return {text:"ปกติ",cls:"ok"};
}
function matchProduct(p,q){
  q = q.trim().toLowerCase();
  return !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || String(p.barcode).includes(q);
}
function renderFilters(){
  const cats=["ทั้งหมด","ใกล้หมด",...new Set(products.map(p=>p.category))];
  filterRow.innerHTML=cats.map(c=>`<button class="filter ${c===currentFilter?'active':''}" onclick="currentFilter='${c}';renderFilters();renderStock()">${c}</button>`).join("");
}
function renderSummary(){
  totalSku.innerText=products.length;
  lowCount.innerText=products.filter(p=>p.stock<=p.reorder).length;
  stockValue.innerText=money(products.reduce((s,p)=>s+p.cost*p.stock,0));
}
function renderStock(){
  const q=searchInput.value;
  const filtered=products.filter(p=>matchProduct(p,q)&&(currentFilter==="ทั้งหมด"||(currentFilter==="ใกล้หมด"&&p.stock<=p.reorder)||p.category===currentFilter));
  stockList.innerHTML=filtered.length?filtered.map(p=>{
    const st=statusOf(p);
    return `<div class="card">
      <div class="row">
        <div>
          <div class="name">${p.name}</div>
          <div class="muted">${p.category}</div>
          <span class="barcode-pill">Barcode: ${p.barcode}</span>
        </div>
        <span class="badge ${st.cls}">${st.text}</span>
      </div>
      <div class="info-grid">
        <div class="info-box"><small>คงเหลือ</small><b>${p.stock} ชิ้น</b></div>
        <div class="info-box"><small>ต้นทุน</small><b>฿${p.cost}</b></div>
        <div class="info-box"><small>ราคาขาย</small><b>฿${p.price}</b></div>
      </div>
    </div>`;
  }).join(""):`<div class="empty">
    <h3>ไม่มีสินค้านี้ในสต๊อก</h3>
    <p>ลองค้นหาชื่ออื่น ยิงบาร์โค้ดใหม่ หรือเพิ่มสินค้าใหม่</p>
    <button class="primary" onclick="searchInput.value='';currentFilter='ทั้งหมด';renderFilters();renderStock()">ล้างคำค้นหา</button>
  </div>`;
}
function sortStock(type){
  if(type==="az")products.sort((a,b)=>a.name.localeCompare(b.name));
  if(type==="low")products.sort((a,b)=>a.stock-b.stock);
  if(type==="highValue")products.sort((a,b)=>(b.stock*b.cost)-(a.stock*a.cost));
  renderStock();
}
renderFilters();renderSummary();renderStock();
</script>
</body>
</html>
