<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koicerys POS | สต๊อกสินค้า</title>
<style>
:root{
  --blue:#3468f5;
  --navy:#173b92;
  --bg:#f3f5fb;
  --card:#ffffff;
  --line:#dce2f0;
  --muted:#64748b;
  --text:#111827;
  --green:#0f766e;
  --red:#dc2626;
  --amber:#d97706;
  --soft:#f1f5fb;
  --shadow:0 16px 38px rgba(30,58,138,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Sarabun","Noto Sans Thai",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.header{
  background:linear-gradient(145deg,#10245f,#1d4297);
  color:white;
  padding:34px clamp(20px,4vw,56px) 56px;
  border-radius:0 0 36px 36px;
}
.header-top{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
}
.header h1{
  margin:0;
  font-size:clamp(1.8rem,2.5vw,2.4rem);
  font-weight:950;
}
.header p{
  margin:10px 0 0;
  opacity:.85;
}
.icon-box{
  width:58px;
  height:58px;
  border-radius:20px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.2);
  font-size:1.5rem;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
  margin-top:24px;
}
.stat{
  background:rgba(255,255,255,.15);
  padding:20px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.16);
}
.stat small{
  opacity:.72;
  font-weight:800;
}
.stat h2{
  margin:10px 0 0;
  font-size:1.55rem;
}
.nav{
  display:flex;
  justify-content:center;
  gap:16px;
  padding:26px 20px 0;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav a{
  min-width:132px;
  min-height:88px;
  border-radius:22px;
  border:1px solid var(--line);
  background:white;
  font-weight:950;
  color:var(--text);
  text-decoration:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  flex-shrink:0;
  box-shadow:var(--shadow);
}
.nav a.active{
  background:var(--blue);
  color:white;
  border-color:var(--blue);
}
.main{
  padding:34px clamp(20px,4vw,56px) 48px;
}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:12px;
  margin-bottom:16px;
}
.section-title h2{
  margin:0;
  font-size:1.65rem;
}
.section-title small{
  color:var(--muted);
  font-weight:900;
}
.box{
  background:white;
  padding:18px;
  border-radius:24px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.search-wrap{
  display:flex;
  gap:10px;
  align-items:center;
}
.search{
  flex:1;
  min-width:0;
  padding:15px;
  border-radius:16px;
  border:1px solid var(--line);
  background:var(--soft);
  font-size:1rem;
}
.search-btn{
  padding:15px 22px;
  border:none;
  border-radius:16px;
  background:var(--blue);
  color:white;
  font-weight:950;
  cursor:pointer;
}
.category-wrap{
  display:flex;
  gap:10px;
  margin:18px 0 16px;
  overflow-x:auto;
  scrollbar-width:none;
}
.category-wrap::-webkit-scrollbar{display:none}
.category-wrap button,
.sort-wrap button{
  border:1px solid var(--line);
  background:white;
  padding:12px 18px;
  border-radius:999px;
  font-weight:950;
  color:#475569;
  cursor:pointer;
  white-space:nowrap;
}
.category-wrap button.active,
.sort-wrap button.active{
  background:#eaf1ff;
  color:#245bd4;
  border-color:#bcd2ff;
}
.sort-wrap{
  display:flex;
  gap:10px;
  margin-bottom:16px;
  overflow-x:auto;
}
.stock-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}
.stock-card{
  background:white;
  padding:18px;
  border-radius:22px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  min-height:210px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.stock-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}
.stock-head h3{
  margin:0;
  font-size:1.08rem;
}
.barcode{
  display:inline-block;
  margin-top:7px;
  padding:5px 9px;
  border-radius:999px;
  background:#edf2f7;
  color:#475569;
  font-size:.75rem;
  font-weight:900;
  word-break:break-all;
}
.badge{
  padding:7px 10px;
  border-radius:999px;
  font-size:.78rem;
  font-weight:950;
  white-space:nowrap;
}
.badge.ok{
  background:#dcfce7;
  color:#166534;
}
.badge.low{
  background:#fee2e2;
  color:#b91c1c;
}
.badge.out{
  background:#111827;
  color:white;
}
.info-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:16px;
}
.info-box{
  background:var(--soft);
  padding:12px;
  border-radius:16px;
}
.info-box small{
  display:block;
  color:var(--muted);
  font-weight:850;
  font-size:.78rem;
  margin-bottom:6px;
}
.info-box b{
  font-size:1.08rem;
}
.empty,.loading{
  grid-column:1/-1;
  color:var(--muted);
  padding:34px 12px;
  text-align:center;
  background:white;
  border-radius:22px;
  border:1px solid var(--line);
}

.auth-logout-btn{
  border:1px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.16);
  color:#fff;
  padding:10px 14px;
  border-radius:14px;
  font-weight:950;
  cursor:pointer;
  white-space:nowrap;
}
.auth-logout-btn:hover{
  background:rgba(255,255,255,.24);
}
.auth-user-email{
  color:rgba(255,255,255,.78);
  font-size:.82rem;
  font-weight:850;
  text-align:right;
  margin-top:6px;
}
.auth-box{
  display:grid;
  gap:4px;
  justify-items:end;
}

@media(max-width:720px){
  .header{
    padding:26px 16px 36px;
  }
  .stats{
    grid-template-columns:1fr;
  }
  .nav{
    justify-content:flex-start;
    padding-left:16px;
    padding-right:16px;
  }
  .nav a{
    min-width:105px;
    min-height:78px;
    font-size:.85rem;
  }
  .main{
    padding:24px 16px 40px;
  }
  .search-wrap{
    align-items:stretch;
  }
  .stock-grid{
    grid-template-columns:1fr;
  }
  .info-grid{
    grid-template-columns:1fr;
  }
}
@media(max-width:440px){
  .section-title{
    display:block;
  }
  .section-title small{
    display:block;
    margin-top:6px;
  }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div>
      <h1>สต๊อกสินค้า</h1>
      <p>เช็คของคงเหลือ / ต้นทุน / ราคาขาย</p>
    </div>

    <div class="auth-box">
      <button class="auth-logout-btn" onclick="logout()">ออกจากระบบ</button>
      <div id="currentUserEmail" class="auth-user-email"></div>
    </div>

  </div>

  <div class="stats">
    <div class="stat">
      <small>สินค้าทั้งหมด</small>
      <h2><span id="totalSku">0</span> SKU</h2>
    </div>
    <div class="stat">
      <small>สินค้าใกล้หมด</small>
      <h2><span id="lowStock">0</span> รายการ</h2>
    </div>
    <div class="stat">
      <small>มูลค่าสต๊อก</small>
      <h2>฿<span id="stockValue">0</span></h2>
    </div>
  </div>
</header>

<nav class="nav">
  <a href="index.html"><span>🧾</span>ขาย</a>
  <a class="active" href="stock.html"><span>📦</span>สต๊อก</a>
  <a href="add-stock.html"><span>➕</span>เติมของ</a>
  <a href="product.html"><span>🏷️</span>สินค้า</a>
  <a href="report.html"><span>📊</span>รายงาน</a>
</nav>

<main class="main">
  <div class="section-title">
    <h2>รายการสินค้า</h2>
    <small>ดึงจาก Google Sheet</small>
  </div>

  <div class="box">
    <div class="search-wrap">
      <input id="searchInput" class="search" placeholder="ค้นหาชื่อสินค้า / บาร์โค้ด / หมวดหมู่" onkeydown="if(event.key==='Enter') renderStock()">
      <button class="search-btn" onclick="renderStock()">ค้นหา</button>
    </div>
  </div>

  <div class="category-wrap" id="categoryWrap"></div>

  <div class="sort-wrap">
    <button id="sortDefault" class="active" onclick="setSort('default')">ค่าเริ่มต้น</button>
    <button id="sortLow" onclick="setSort('low')">คงเหลือน้อย</button>
    <button id="sortHighValue" onclick="setSort('value')">มูลค่าสูง</button>
    <button id="sortAZ" onclick="setSort('az')">A-Z</button>
  </div>

  <div class="stock-grid" id="stockList">
    <div class="loading">กำลังโหลดสต๊อกจาก Google Sheet...</div>
  </div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzzkIqWxnmrFj48bTks8tC4KgOuhjfTomH6RRGUtdSgjFLrBpAbGcYuPlr2karfeXzuqQ/exec";

let products = [];
let currentCategory = "ทั้งหมด";
let currentSort = "default";

function money(n){
  return Number(n || 0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});
}

function statusOf(p){
  if(p.stock <= 0) return {text:"หมด", cls:"out"};
  if(p.stock <= p.reorder) return {text:"ใกล้หมด", cls:"low"};
  return {text:"ปกติ", cls:"ok"};
}

async function loadProducts(){
  try{
    const res = await fetch(API_URL + "?action=getProducts");
    const json = await res.json();

    if(!json.success){
      throw new Error(json.message || "โหลดข้อมูลไม่สำเร็จ");
    }

    products = json.data
      .filter(p => String(p.status || "active").toLowerCase() === "active")
      .map(p => ({
        id: String(p.product_id),
        barcode: String(p.barcode || ""),
        name: String(p.name || ""),
        category: String(p.category || ""),
        cost: Number(p.cost || 0),
        price: Number(p.price || 0),
        stock: Number(p.stock || 0),
        reorder: Number(p.reorder_point || 0),
        unit: String(p.unit || "ชิ้น")
      }));

    renderCategories();
    renderStock();
    updateSummary();
  }catch(err){
    document.getElementById("stockList").innerHTML =
      `<div class="empty">โหลดสต๊อกจาก Google Sheet ไม่สำเร็จ<br>${err.message}</div>`;
  }
}

function renderCategories(){
  const base = ["ทั้งหมด","ใกล้หมด","เครื่องดื่ม","แอลกอฮอล์","ยา","ขนม"];
  const fromSheet = [...new Set(products.map(p => p.category).filter(Boolean))];
  const categories = [...new Set([...base,...fromSheet])];

  document.getElementById("categoryWrap").innerHTML = categories.map(cat => `
    <button class="${cat === currentCategory ? "active" : ""}" onclick="setCategory('${cat}')">${cat}</button>
  `).join("");
}

function setCategory(cat){
  currentCategory = cat;
  renderCategories();
  renderStock();
}

function setSort(sort){
  currentSort = sort;
  ["sortDefault","sortLow","sortHighValue","sortAZ"].forEach(id => {
    document.getElementById(id).classList.remove("active");
  });

  const map = {
    default:"sortDefault",
    low:"sortLow",
    value:"sortHighValue",
    az:"sortAZ"
  };

  document.getElementById(map[sort]).classList.add("active");
  renderStock();
}

function matchProduct(p,q){
  q = String(q || "").trim().toLowerCase();
  return !q ||
    p.name.toLowerCase().includes(q) ||
    p.barcode.includes(q) ||
    p.category.toLowerCase().includes(q);
}

function getFilteredProducts(){
  const q = document.getElementById("searchInput").value;

  let list = products.filter(p => {
    const matchCat =
      currentCategory === "ทั้งหมด" ||
      (currentCategory === "ใกล้หมด" && p.stock <= p.reorder) ||
      p.category === currentCategory;

    return matchCat && matchProduct(p,q);
  });

  if(currentSort === "low"){
    list.sort((a,b) => a.stock - b.stock);
  }

  if(currentSort === "value"){
    list.sort((a,b) => (b.stock * b.cost) - (a.stock * a.cost));
  }

  if(currentSort === "az"){
    list.sort((a,b) => a.name.localeCompare(b.name,"th"));
  }

  return list;
}

function renderStock(){
  const list = getFilteredProducts();

  document.getElementById("stockList").innerHTML = list.length ? list.map(p => {
    const status = statusOf(p);

    return `
      <div class="stock-card">
        <div>
          <div class="stock-head">
            <div>
              <h3>${p.name}</h3>
              <div style="color:var(--muted);font-size:.9rem;margin-top:4px">${p.category || "-"}</div>
              <span class="barcode">Barcode: ${p.barcode}</span>
            </div>
            <span class="badge ${status.cls}">${status.text}</span>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <small>คงเหลือ</small>
            <b>${money(p.stock)} ${p.unit}</b>
          </div>
          <div class="info-box">
            <small>ต้นทุน</small>
            <b>฿${money(p.cost)}</b>
          </div>
          <div class="info-box">
            <small>ราคาขาย</small>
            <b>฿${money(p.price)}</b>
          </div>
        </div>
      </div>
    `;
  }).join("") : `<div class="empty">ไม่พบสินค้าในสต๊อก</div>`;
}

function updateSummary(){
  const totalSku = products.length;
  const low = products.filter(p => p.stock <= p.reorder).length;
  const value = products.reduce((sum,p) => sum + (p.stock * p.cost),0);

  document.getElementById("totalSku").innerText = money(totalSku);
  document.getElementById("lowStock").innerText = money(low);
  document.getElementById("stockValue").innerText = money(value);
}

loadProducts();
</script>


<!-- Firebase Auth Guard -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="guard.js"></script>

</body>
</html>
