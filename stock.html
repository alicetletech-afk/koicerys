<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สต๊อกสินค้า | Koicerys</title>
<style>
:root{
  --blue:#173a8c;
  --blue2:#316BFF;
  --bg:#eef3fb;
  --surface:#ffffff;
  --soft:#f4f7fc;
  --line:#dfe7f3;
  --text:#172033;
  --muted:#6f7d95;
  --green:#0f766e;
  --red:#dc2626;
  --shadow:0 14px 38px rgba(23,58,140,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Sarabun","Noto Sans Thai",Arial,sans-serif;
  background:linear-gradient(90deg,#dfe8f6,#f7f9fd,#dfe8f6);
  color:var(--text);
}
.app{
  width:min(100%,480px);
  margin:0 auto;
  min-height:100vh;
  background:#f8faff;
  padding-bottom:28px;
  box-shadow:0 0 55px rgba(15,23,42,.08);
}
.hero{
  background:linear-gradient(145deg,#10245f,#1d4297);
  color:white;
  padding:28px 20px 34px;
  border-bottom-left-radius:36px;
  border-bottom-right-radius:36px;
}
.hero-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:22px;
}
h1{margin:0;font-size:2rem;line-height:1.1;font-weight:950}
.hero p{margin:8px 0 0;color:rgba(255,255,255,.78);font-size:.95rem}
.icon-box{
  width:56px;height:56px;border-radius:20px;
  display:grid;place-items:center;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  font-size:1.6rem;
  flex:0 0 auto;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}
.stat{
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  border-radius:22px;
  padding:16px;
}
.stat .label{font-size:.78rem;color:rgba(255,255,255,.75);font-weight:800;margin-bottom:6px}
.stat .value{font-size:1.45rem;font-weight:950}
.nav{
  display:grid;
  grid-template-columns:repeat(5,minmax(70px,1fr));
  gap:10px;
  padding:16px 16px 4px;
  margin-top:-18px;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav a{
  min-height:72px;
  text-decoration:none;
  color:#26344f;
  background:white;
  border:1px solid var(--line);
  border-radius:20px;
  padding:12px 8px;
  text-align:center;
  font-size:.8rem;
  font-weight:900;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
}
.nav a.active{background:var(--blue2);color:white;border-color:var(--blue2)}
.nav .icon{font-size:1.4rem;line-height:1}
.content{padding:18px 16px 28px}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:12px;
  margin:12px 2px 16px;
}
.section-title h2{margin:0;font-size:1.65rem;font-weight:950}
.section-title small{color:var(--muted);font-weight:900;font-size:.95rem;white-space:nowrap}
.search-card{
  background:white;
  border:1px solid var(--line);
  border-radius:26px;
  padding:14px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
.search-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:20px;
  padding:10px 12px;
}
.search-box .search-icon{font-size:1.35rem;color:var(--muted);flex:0 0 auto}
.search-box input{
  width:100%;
  min-width:0;
  border:0;
  outline:0;
  background:transparent;
  padding:10px 2px;
  font-size:1rem;
  color:var(--text);
}
.search-btn{
  border:0;
  background:var(--blue2);
  color:white;
  border-radius:16px;
  padding:13px 16px;
  font-weight:950;
  cursor:pointer;
  font-size:.95rem;
}
.filter-row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
  padding:0 2px 14px;
}
.filter-row::-webkit-scrollbar{display:none}
.filter{
  border:1px solid var(--line);
  background:white;
  color:#53627d;
  border-radius:999px;
  padding:11px 16px;
  font-weight:950;
  white-space:nowrap;
  box-shadow:0 8px 22px rgba(27,45,85,.05);
  cursor:pointer;
}
.filter.active{background:#eaf1ff;color:#245bd4;border-color:#bcd2ff}
.stock-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.stock-card{
  background:white;
  border:1px solid var(--line);
  border-radius:26px;
  padding:16px;
  box-shadow:var(--shadow);
  min-height:205px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
  overflow:hidden;
}
.stock-card:after{
  content:"";
  position:absolute;
  right:-34px;top:-34px;
  width:96px;height:96px;
  border-radius:999px;
  background:#f1f5ff;
}
.stock-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  position:relative;
  z-index:1;
}
.name{font-size:1.08rem;font-weight:950;line-height:1.35}
.muted{color:var(--muted);font-size:.9rem;line-height:1.45}
.barcode-pill{
  display:inline-block;
  background:#f1f5f9;
  color:#475569;
  border-radius:999px;
  padding:6px 10px;
  font-size:.78rem;
  font-weight:950;
  margin-top:8px;
}
.badge{
  border-radius:999px;
  padding:8px 11px;
  font-size:.8rem;
  font-weight:950;
  white-space:nowrap;
  position:relative;
  z-index:1;
}
.badge.ok{background:#dcfce7;color:#166534}
.badge.low{background:#fee2e2;color:#b91c1c}
.badge.out{background:#1f2937;color:white}
.info-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:14px;
  position:relative;
  z-index:1;
}
.info-box{background:var(--soft);border-radius:20px;padding:13px}
.info-box small{display:block;color:var(--muted);font-size:.75rem;font-weight:900;margin-bottom:6px}
.info-box b{font-size:1.15rem;font-weight:950}
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:30px 18px;
  color:var(--muted);
  background:white;
  border-radius:28px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.empty h3{margin:0 0 8px;font-size:1.25rem;color:var(--text)}
.empty p{margin:0 0 16px;font-size:.95rem;line-height:1.5}
.primary{
  border:0;
  background:var(--blue2);
  color:white;
  border-radius:16px;
  padding:13px 16px;
  font-weight:950;
  cursor:pointer;
}
@media (min-width:700px){
  .app{width:min(100%,720px)}
  .hero{padding:32px 28px 42px}
  .content{padding:22px 28px 36px}
  .nav{padding:18px 28px 6px}
  .stock-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (min-width:1100px){
  .app{width:min(100%,1120px)}
  .hero{
    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;
    padding:34px 36px 44px;
  }
  .content{padding:26px 36px 42px}
  .nav{padding:20px 36px 8px;grid-template-columns:repeat(5,120px)}
  .stock-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .stock-card{min-height:230px}
  .info-grid{grid-template-columns:1fr}
}
@media (max-width:390px){
  h1{font-size:1.75rem}
  .stats{grid-template-columns:1fr}
  .stock-grid{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
<header class="hero">
  <div class="hero-top">
    <div>
      <h1>สต๊อกสินค้า</h1>
      <p>ค้นด้วยชื่อ / หมวด / บาร์โค้ด</p>
    </div>
    <div class="icon-box">📦</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="label">สินค้าทั้งหมด</div><div class="value"><span id="totalSku">0</span></div></div>
    <div class="stat"><div class="label">ใกล้หมด</div><div class="value"><span id="lowCount">0</span></div></div>
    <div class="stat"><div class="label">มูลค่าสต๊อก</div><div class="value">฿<span id="stockValue">0</span></div></div>
  </div>
</header>

<nav class="nav">
  <a href="index.html"><span class="icon">🧾</span>ขาย</a>
  <a class="active" href="stock.html"><span class="icon">📦</span>สต๊อก</a>
  <a href="add-stock.html"><span class="icon">➕</span>เติมของ</a>
  <a href="product.html"><span class="icon">🏷️</span>สินค้า</a>
  <a href="report.html"><span class="icon">📊</span>รายงาน</a>
</nav>

<main class="content">
  <div class="section-title">
    <h2>รายการสินค้า</h2>
    <small>มี Barcode</small>
  </div>

  <div class="search-card">
    <div class="search-box">
      <span class="search-icon">🔎</span>
      <input id="searchInput" placeholder="ยิงบาร์โค้ด หรือค้นหาชื่อสินค้า" onkeydown="if(event.key==='Enter')renderStock()">
      <button class="search-btn" onclick="renderStock()">ค้นหา</button>
    </div>
  </div>

  <div class="filter-row" id="filterRow"></div>
  <div class="filter-row">
    <button class="filter" onclick="sortStock('az')">A-Z</button>
    <button class="filter" onclick="sortStock('low')">คงเหลือน้อย</button>
    <button class="filter" onclick="sortStock('highValue')">มูลค่าสูง</button>
  </div>

  <div class="stock-grid" id="stockList"></div>
</main>
</div>

<script>
let products = [
  { id:1, barcode:"8850001000011", name:"น้ำดื่มคริสตัล 600ml", category:"เครื่องดื่ม", cost:5, price:7, stock:24, reorder:10 },
  { id:2, barcode:"8850001000028", name:"โค้กกระป๋อง", category:"เครื่องดื่ม", cost:14, price:18, stock:18, reorder:8 },
  { id:3, barcode:"8850001000035", name:"โออิชิ 500ml", category:"เครื่องดื่ม", cost:16, price:22, stock:9, reorder:10 },
  { id:4, barcode:"8850001000042", name:"มาม่าต้มยำกุ้ง", category:"ของแห้ง", cost:6, price:8, stock:50, reorder:20 },
  { id:5, barcode:"8850001000059", name:"เลย์โนริ", category:"ขนม", cost:15, price:20, stock:12, reorder:10 },
  { id:6, barcode:"8850001000066", name:"นมถั่วเหลือง", category:"นม/แช่เย็น", cost:10, price:13, stock:6, reorder:8 },
  { id:7, barcode:"8850001000073", name:"สบู่ก้อน", category:"ของใช้", cost:18, price:25, stock:14, reorder:6 },
  { id:8, barcode:"8850001000080", name:"ทิชชู่ห่อเล็ก", category:"ของใช้", cost:9, price:12, stock:20, reorder:8 }
];

let currentFilter="ทั้งหมด";

function money(n){return Number(n).toLocaleString();}
function statusOf(p){
  if(p.stock<=0) return {text:"หมด",cls:"out"};
  if(p.stock<=p.reorder) return {text:"ใกล้หมด",cls:"low"};
  return {text:"ปกติ",cls:"ok"};
}
function matchProduct(p,q){
  q = String(q || "").trim().toLowerCase();
  return !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || String(p.barcode).includes(q);
}
function renderFilters(){
  const cats=["ทั้งหมด","ใกล้หมด",...new Set(products.map(p=>p.category))];
  filterRow.innerHTML=cats.map(c=>`<button class="filter ${c===currentFilter?'active':''}" onclick="currentFilter='${c}';renderFilters();renderStock()">${c}</button>`).join("");
}
function renderSummary(){
  totalSku.innerText=products.length;
  lowCount.innerText=products.filter(p=>p.stock<=p.reorder).length;
  stockValue.innerText=money(products.reduce((s,p)=>s+p.cost*p.stock,0));
}
function renderStock(){
  const q=searchInput.value;
  const filtered=products.filter(p=>matchProduct(p,q)&&(currentFilter==="ทั้งหมด"||(currentFilter==="ใกล้หมด"&&p.stock<=p.reorder)||p.category===currentFilter));
  stockList.innerHTML=filtered.length?filtered.map(p=>{
    const st=statusOf(p);
    return `
      <article class="stock-card">
        <div>
          <div class="stock-head">
            <div>
              <div class="name">${p.name}</div>
              <div class="muted">${p.category}</div>
              <span class="barcode-pill">Barcode: ${p.barcode}</span>
            </div>
            <span class="badge ${st.cls}">${st.text}</span>
          </div>
        </div>
        <div class="info-grid">
          <div class="info-box"><small>คงเหลือ</small><b>${p.stock} ชิ้น</b></div>
          <div class="info-box"><small>ต้นทุน</small><b>฿${p.cost}</b></div>
          <div class="info-box"><small>ราคาขาย</small><b>฿${p.price}</b></div>
        </div>
      </article>
    `;
  }).join(""):`<div class="empty">
    <h3>ไม่มีสินค้านี้ในสต๊อก</h3>
    <p>ลองค้นหาชื่ออื่น ยิงบาร์โค้ดใหม่ หรือเพิ่มสินค้าใหม่</p>
    <button class="primary" onclick="searchInput.value='';currentFilter='ทั้งหมด';renderFilters();renderStock()">ล้างคำค้นหา</button>
  </div>`;
}
function sortStock(type){
  if(type==="az")products.sort((a,b)=>a.name.localeCompare(b.name));
  if(type==="low")products.sort((a,b)=>a.stock-b.stock);
  if(type==="highValue")products.sort((a,b)=>(b.stock*b.cost)-(a.stock*a.cost));
  renderStock();
}
renderFilters();renderSummary();renderStock();
</script>
</body>
</html>
