<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการสินค้า | Koicerys</title>
<style>
:root{
  --blue:#173a8c;
  --blue2:#316BFF;
  --bg:#eef3fb;
  --surface:#ffffff;
  --soft:#f4f7fc;
  --line:#dfe7f3;
  --text:#172033;
  --muted:#6f7d95;
  --green:#0f766e;
  --red:#dc2626;
  --shadow:0 14px 38px rgba(23,58,140,.08);
}
*{box-sizing:border-box}
html{font-size:16px}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Sarabun","Noto Sans Thai",Arial,sans-serif;
  background:linear-gradient(90deg,#dfe8f6,#f7f9fd,#dfe8f6);
  color:var(--text);
}
.app{
  width:min(100%,480px);
  margin:0 auto;
  min-height:100vh;
  background:#f8faff;
  padding-bottom:28px;
  box-shadow:0 0 55px rgba(15,23,42,.08);
}
.hero{
  background:linear-gradient(145deg,#10245f,#1d4297);
  color:white;
  padding:28px 20px 34px;
  border-bottom-left-radius:36px;
  border-bottom-right-radius:36px;
}
.hero-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:22px;
}
h1{margin:0;font-size:2rem;line-height:1.1;font-weight:950}
.hero p{margin:8px 0 0;color:rgba(255,255,255,.78);font-size:.95rem}
.icon-box{
  width:56px;height:56px;border-radius:20px;
  display:grid;place-items:center;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  font-size:1.6rem;
  flex:0 0 auto;
}
.stats{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.stats.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.stat{
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  border-radius:22px;
  padding:16px;
}
.stat .label{font-size:.78rem;color:rgba(255,255,255,.75);font-weight:800;margin-bottom:6px}
.stat .value{font-size:1.45rem;font-weight:950}
.nav{
  display:grid;
  grid-template-columns:repeat(5,minmax(70px,1fr));
  gap:10px;
  padding:16px 16px 4px;
  margin-top:-18px;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav a{
  min-height:72px;
  text-decoration:none;
  color:#26344f;
  background:white;
  border:1px solid var(--line);
  border-radius:20px;
  padding:12px 8px;
  text-align:center;
  font-size:.8rem;
  font-weight:900;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
}
.nav a.active{background:var(--blue2);color:white;border-color:var(--blue2)}
.nav .icon{font-size:1.4rem;line-height:1}
.content{padding:18px 16px 28px}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:12px;
  margin:12px 2px 16px;
}
.section-title h2{margin:0;font-size:1.65rem;font-weight:950}
.section-title small{color:var(--muted);font-weight:900;font-size:.95rem;white-space:nowrap}
.card{
  background:white;
  border:1px solid var(--line);
  border-radius:26px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.search-card{
  background:white;
  border:1px solid var(--line);
  border-radius:26px;
  padding:14px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
.search-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:20px;
  padding:10px 12px;
}
.search-box .search-icon{font-size:1.35rem;color:var(--muted);flex:0 0 auto}
input,select{
  width:100%;
  min-width:0;
  border:1px solid var(--line);
  background:var(--soft);
  border-radius:18px;
  padding:14px 16px;
  font-size:1rem;
  outline:none;
  color:var(--text);
}
.search-box input{
  border:0;
  background:transparent;
  border-radius:0;
  padding:10px 2px;
}
button,.primary,.secondary{
  border:0;
  border-radius:16px;
  padding:13px 16px;
  font-weight:950;
  cursor:pointer;
  font-size:.95rem;
}
.primary{background:var(--blue2);color:white}
.secondary{background:#eef3ff;color:#245bd4}
.filter-row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
  padding:0 2px 14px;
}
.filter-row::-webkit-scrollbar{display:none}
.filter{
  border:1px solid var(--line);
  background:white;
  color:#53627d;
  border-radius:999px;
  padding:11px 16px;
  font-weight:950;
  white-space:nowrap;
  box-shadow:0 8px 22px rgba(27,45,85,.05);
}
.filter.active{background:#eaf1ff;color:#245bd4;border-color:#bcd2ff}
.grid-products{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.product-card{
  min-height:158px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
.product-card:after{
  content:"";
  position:absolute;
  right:-34px;top:-34px;
  width:96px;height:96px;
  border-radius:999px;
  background:#f1f5ff;
}
.product-card .add-dot{
  position:absolute;
  right:12px;top:12px;
  z-index:2;
  width:34px;height:34px;
  border-radius:50%;
  background:var(--blue2);
  color:white;
  display:grid;
  place-items:center;
  font-weight:950;
  font-size:1.2rem;
}
.emoji{
  width:44px;height:44px;border-radius:17px;
  background:#f6f8fc;
  display:grid;place-items:center;
  font-size:1.4rem;
  margin-bottom:10px;
  position:relative;
  z-index:1;
}
.name{font-size:1.08rem;font-weight:950;line-height:1.35}
.muted{color:var(--muted);font-size:.9rem;line-height:1.45}
.price{font-size:1.55rem;font-weight:950;color:var(--green)}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.row-start{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.barcode-pill{
  display:inline-block;
  background:#f1f5f9;
  color:#475569;
  border-radius:999px;
  padding:6px 10px;
  font-size:.78rem;
  font-weight:950;
  margin-top:8px;
}
.badge{
  border-radius:999px;
  padding:8px 11px;
  font-size:.8rem;
  font-weight:950;
  white-space:nowrap;
}
.badge.ok{background:#dcfce7;color:#166534}
.badge.low{background:#fee2e2;color:#b91c1c}
.badge.out{background:#1f2937;color:white}
.info-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}
.info-box{background:var(--soft);border-radius:20px;padding:13px}
.info-box small{display:block;color:var(--muted);font-size:.78rem;font-weight:900;margin-bottom:6px}
.info-box b{font-size:1.3rem;font-weight:950}
.form{display:grid;gap:12px}
.form label{font-size:.9rem;font-weight:950;color:#53627d}
.form-grid{display:grid;grid-template-columns:1fr;gap:12px}
.full{grid-column:1/-1}
.cart-drawer{
  position:sticky;
  bottom:14px;
  background:white;
  border:1px solid var(--line);
  border-radius:28px;
  box-shadow:0 18px 45px rgba(15,23,42,.16);
  padding:16px;
  margin-top:16px;
  z-index:10;
}
.checkout-row{display:grid;grid-template-columns:1fr 1.55fr;gap:10px;align-items:center}
.total{background:var(--soft);border-radius:20px;padding:13px}
.total small{display:block;color:var(--muted);font-size:.78rem;font-weight:800}
.total b{font-size:1.35rem;font-weight:950}
.table-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid #eef2f7;
}
.table-row:last-child{border-bottom:0}
.empty{
  text-align:center;
  padding:30px 18px;
  color:var(--muted);
  background:white;
  border-radius:28px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.empty h3{margin:0 0 8px;font-size:1.25rem;color:var(--text)}
.empty p{margin:0 0 16px;font-size:.95rem;line-height:1.5}
.help{font-size:.82rem;color:var(--muted);margin-top:8px;line-height:1.5}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (min-width: 700px){
  .app{width:min(100%,720px)}
  .hero{padding:32px 28px 42px}
  .content{padding:22px 28px 36px}
  .nav{padding:18px 28px 6px}
  .grid-products{grid-template-columns:repeat(3,minmax(0,1fr))}
  .form-grid{grid-template-columns:1fr 1fr}
  .report-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
}
@media (min-width: 1100px){
  .app{width:min(100%,1120px)}
  .hero{
    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;
    padding:34px 36px 44px;
  }
  .content{padding:26px 36px 42px}
  .nav{padding:20px 36px 8px;grid-template-columns:repeat(5,120px)}
  .grid-products{grid-template-columns:repeat(4,minmax(0,1fr))}
  .desktop-2col{display:grid;grid-template-columns:1.3fr .8fr;gap:18px;align-items:start}
  .cart-drawer{position:sticky;top:24px;bottom:auto;margin-top:0}
  .stock-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
  .stock-list .card{margin-bottom:0}
}
@media (max-width: 390px){
  h1{font-size:1.75rem}
  .stats.three{grid-template-columns:1fr}
  .grid-products{grid-template-columns:1fr}
  .checkout-row{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="app">
<header class="hero">
  <div class="hero-top"><div><h1>จัดการสินค้า</h1><p>เพิ่มสินค้าใหม่ + ผูกบาร์โค้ด</p></div><div class="icon-box">🏷️</div></div>
  <div class="stats"><div class="stat"><div class="label">สินค้าในระบบ</div><div class="value">8</div></div><div class="stat"><div class="label">รองรับ</div><div class="value">Barcode</div></div></div>
</header>
<nav class="nav"><a class="" href="index.html"><span class="icon">🧾</span>ขาย</a><a class="" href="stock.html"><span class="icon">📦</span>สต๊อก</a><a class="" href="add-stock.html"><span class="icon">➕</span>เติมของ</a><a class="active" href="product.html"><span class="icon">🏷️</span>สินค้า</a><a class="" href="report.html"><span class="icon">📊</span>รายงาน</a></nav>
<main class="content">
  <div class="desktop-2col">
    <section>
      <div class="section-title"><h2>เพิ่มสินค้าใหม่</h2><small>Master data</small></div>
      <div class="card form">
        <label>ยิง/กรอกบาร์โค้ด</label><input id="barcode" placeholder="ยิงบาร์โค้ดตรงนี้ เช่น 885..." autofocus>
        <label>ชื่อสินค้า</label><input id="name" placeholder="เช่น น้ำดื่ม 600ml">
        <label>หมวดหมู่</label><select id="category"><option>เครื่องดื่ม</option><option>ขนม</option><option>ของแห้ง</option><option>นม/แช่เย็น</option><option>ของใช้</option></select>
        <div class="form-grid"><div><label>ต้นทุน</label><input id="cost" type="number"></div><div><label>ราคาขาย</label><input id="price" type="number"></div></div>
        <div class="form-grid"><div><label>สต๊อกเริ่มต้น</label><input id="stock" type="number"></div><div><label>จุดเตือนสั่งซื้อ</label><input id="reorder" type="number"></div></div>
        <button class="primary" onclick="addProduct()">เพิ่มสินค้า</button>
      </div>
    </section>
    <aside>
      <div class="section-title"><h2>สินค้าในระบบ</h2><small>ค้นบาร์โค้ดได้</small></div>
      <div id="productList"></div>
    </aside>
  </div>
</main>
</div>

<script>
let products = [
  { id:1, barcode:"8850001000011", name:"น้ำดื่มคริสตัล 600ml", category:"เครื่องดื่ม", cost:5, price:7, stock:24, reorder:10, emoji:"💧" },
  { id:2, barcode:"8850001000028", name:"โค้กกระป๋อง", category:"เครื่องดื่ม", cost:14, price:18, stock:18, reorder:8, emoji:"🥤" },
  { id:3, barcode:"8850001000035", name:"โออิชิ 500ml", category:"เครื่องดื่ม", cost:16, price:22, stock:9, reorder:10, emoji:"🍵" },
  { id:4, barcode:"8850001000042", name:"มาม่าต้มยำกุ้ง", category:"ของแห้ง", cost:6, price:8, stock:50, reorder:20, emoji:"🍜" },
  { id:5, barcode:"8850001000059", name:"เลย์โนริ", category:"ขนม", cost:15, price:20, stock:12, reorder:10, emoji:"🍟" },
  { id:6, barcode:"8850001000066", name:"นมถั่วเหลือง", category:"นม/แช่เย็น", cost:10, price:13, stock:6, reorder:8, emoji:"🥛" },
  { id:7, barcode:"8850001000073", name:"สบู่ก้อน", category:"ของใช้", cost:18, price:25, stock:14, reorder:6, emoji:"🧼" },
  { id:8, barcode:"8850001000080", name:"ทิชชู่ห่อเล็ก", category:"ของใช้", cost:9, price:12, stock:20, reorder:8, emoji:"🧻" }
];
function money(n){return Number(n).toLocaleString();}
function statusOf(p){
  if(p.stock<=0) return {text:"หมด",cls:"out"};
  if(p.stock<=p.reorder) return {text:"ใกล้หมด",cls:"low"};
  return {text:"ปกติ",cls:"ok"};
}
function matchProduct(p,q){
  q = String(q || "").trim().toLowerCase();
  return !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || String(p.barcode).includes(q);
}
</script>
<script>
function renderList(){
 productList.innerHTML=products.map(p=>`<div class="card"><div class="row-start"><div><div class="name">${p.name}</div><div class="muted">${p.category}</div><span class="barcode-pill">Barcode: ${p.barcode}</span></div><button class="secondary" onclick="alert('Demo: ต่อไปทำหน้าแก้ไข')">แก้ไข</button></div></div>`).join("");
}
function addProduct(){
 if(!barcode.value||!name.value)return alert("กรอก/ยิงบาร์โค้ด และชื่อสินค้าก่อน");
 products.unshift({id:Date.now(),barcode:barcode.value,name:name.value,category:category.value,cost:Number(cost.value||0),price:Number(price.value||0),stock:Number(stock.value||0),reorder:Number(reorder.value||0),emoji:"📦"});
 renderList();alert("เพิ่มสินค้าแล้ว (Demo ยังไม่บันทึกถาวร)");
 barcode.value=name.value=cost.value=price.value=stock.value=reorder.value="";
}
renderList();
</script>
</body>
</html>
